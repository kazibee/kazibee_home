module:
  downloads:
    basePath: '/downloads'
    paths:
      '/binary/:kind':
        get:
          x-controller: download.controller
          x-action: listVersions
          summary: 'List available Kazibee versions for a download kind (cli|app)'
          parameters:
            - name: kind
              in: path
              required: true
              schema:
                type: string
                enum: [cli, app]
          responses:
            '200':
              description: 'Versions available for download'
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      versions:
                        type: array
                        items:
                          type: object
                          properties:
                            version:
                              type: string
                            downloads:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  href:
                                    type: string
                                  size:
                                    type: number
                                  lastModified:
                                    type: string
                                    nullable: true
            '400':
              description: 'Invalid download kind'
      '/binary/:kind/:version/:item':
        get:
          x-controller: download.controller
          x-action: downloadItem
          summary: 'Redirect to a temporary Kazibee download URL'
          parameters:
            - name: kind
              in: path
              required: true
              schema:
                type: string
                enum: [cli, app]
            - name: version
              in: path
              required: true
              schema:
                type: string
            - name: item
              in: path
              required: true
              schema:
                type: string
          responses:
            '302':
              description: 'Redirect to temporary S3 download URL'
            '400':
              description: 'Invalid kind, version, or item'
            '404':
              description: 'Download item not found'
